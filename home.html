<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الصفحة الرئيسية</title>
    <style>
        body {
            font-family: 'Tahoma', sans-serif;
            background: linear-gradient(135deg, #9e9da7, #dadada);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 50px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            text-align: center;
        }
        h1 { color: #003ea1; font-size: 40px; margin-bottom: 10px; }
        h2 { color: #000000; font-size: 28px; }
        p { color: #4b4b4b; font-size: 18px; margin: 20px 0; }
        .info {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
        button {
            padding: 14px 30px;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }
        button:hover { background: #e84118; }
    </style>
</head>
<body>
        <h2 id="userName"></h2>
       
        <div class="info">
          
        <button onclick="logout()">تسجيل خروج</button>
    </div>

    <script>
        window.onload = function() {
            const currentUser = sessionStorage.getItem('currentUser');
            
            if (!currentUser) {
                window.location.href = "login.html";
                return;
            }
            
            document.getElementById('userName').textContent = currentUser;
            document.getElementById('loginTime').textContent = new Date().toLocaleString();
        }

        function logout() {
            sessionStorage.removeItem('currentUser');
            window.location.href = "login.html";
        }
    </script>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>XO - شخصين</title>
    <style>
        body {
            font-family: Tahoma, sans-serif;
            background: #2c3e50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        h1 {
            color: white;
            font-size: 45px;
            margin-bottom: 10px;
        }

        h2 {
            color: #ffce54;
            font-size: 22px;
            margin-bottom: 20px;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 5px;
            background: #0f3460;
            padding: 5px;
        }

        .cell {
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            font-weight: bold;
            cursor: pointer;
        }

        .cell:hover {
            background: #ecf0f1;
        }

        .cell.x { color: #e74c3c; }
        .cell.o { color: #3498db; }

        .result {
            color: #2ecc71;
            font-size: 32px;
            font-weight: bold;
            margin: 20px 0;
        }

        button {
            padding: 15px 35px;
            font-size: 18px;
            background: #e74c3c;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #c0392b;
        }
    </style>
</head>
<body>
    <h1>❌ XO ⭕</h1>
    <h2 id="turn">دور: X - Player 1</h2>
    
    <div class="board">
        <div class="cell" onclick="play(0)"></div>
        <div class="cell" onclick="play(1)"></div>
        <div class="cell" onclick="play(2)"></div>
        <div class="cell" onclick="play(3)"></div>
        <div class="cell" onclick="play(4)"></div>
        <div class="cell" onclick="play(5)"></div>
        <div class="cell" onclick="play(6)"></div>
        <div class="cell" onclick="play(7)"></div>
        <div class="cell" onclick="play(8)"></div>
    </div>
    
    <div class="result" id="result"></div>
    <button onclick="restart()">لعبة جديدة</button>

    <script>
        let turn = 'X';
        let cells = ['', '', '', '', '', '', '', '', '', ''];
        let active = true;

        const win = [
            [0,1,2], [3,4,5], [6,7,8],
            [0,3,6], [1,4,7], [2,5,8],
            [0,4,8], [2,4,6]
        ];

        function play(i) {
            if (cells[i] !== '' || !active) return;

            cells[i] = turn;
            let d = document.getElementsByClassName('cell')[i];
            d.innerHTML = turn;
            d.classList.add(turn);

            if (checkWin()) {
                let name = turn === 'X' ? 'Player 1' : 'Player 2';
                document.getElementById('result').innerHTML = '🎉 فاز: ' + name;
                active = false;
                return;
            }

            if (!cells.includes('')) {
                document.getElementById('result').innerHTML = '🤝 تعادل!';
                active = false;
                return;
            }

            turn = turn === 'X' ? 'O' : 'X';
            let pNum = turn === 'X' ? 'Player 1' : 'Player 2';
            document.getElementById('turn').innerHTML = 'دور: ' + turn + ' - ' + pNum;
        }

        function checkWin() {
            for (let w of win) {
                let [a,b,c] = w;
                if (cells[a] && cells[a] === cells[b] && cells[a] === cells[c]) {
                    return true;
                }
            }
            return false;
        }

        function restart() {
            turn = 'X';
            cells = ['', '', '', '', '', '', '', '', '', ''];
            active = true;
            document.getElementById('turn').innerHTML = 'دور: X - Player 1';
            document.getElementById('result').innerHTML = '';
            
            let d = document.getElementsByClassName('cell');
            for (let i = 0; i < 9; i++) {
                d[i].innerHTML = '';
                d[i].className = 'cell';
            }
        }
    </script>
</body>
</html>
