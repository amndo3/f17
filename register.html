<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إنشاء حساب</title>
    <style>
        body {
            font-family: 'Tahoma', sans-serif;
            background: linear-gradient(135deg, #08a82b, #773314);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            width: 350px;
            text-align: center;
        }
        h2 { color: #292929; margin-bottom: 25px; }
        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus { outline: none; border-color: #7c6416; }
        button {
            width: 100%;
            padding: 14px;
            background: #003c9c;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 15px;
        }
        button:hover { background: #464d5a; }
        p { margin-top: 15px; color: #666; }
        a { color: #b5bac4; text-decoration: none; }
        #message { margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>إنشاء حساب جديد</h2>
        <input type="text" id="username" placeholder="اسم المستخدم">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button onclick="register()">إنشاء حساب</button>
        <p>لديك حساب؟ <a href="login.html">تسجيل دخول</a></p>
        <p id="message"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
